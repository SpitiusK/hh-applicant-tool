services:
  hh_applicant_tool:
    container_name: hh_applicant_tool
    image: hh_applicant_tool:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      # Пробрасываем таймзону хоста
      - /etc/localtime:/etc/localtime:ro
      # Claude CLI авторизация хоста (подписка пользователя)
      - ${HOME}/.claude:/home/docker/.claude
      - ${HOME}/.claude.json:/home/docker/.claude.json
      # Для `generate-persona` — монтируй okami-reports как read-only:
      # - ../okami-reports:/app/okami-reports:ro
    restart: unless-stopped
    environment:
      # Это не трогаем
      - CONFIG_DIR=/app/config
      # Смените или закомментируйте при проблемах
      - TERM=${TERM}
      # Если время на сервере отличается
      # - TZ=Europe/Moscow

  # Long-running Telegram-бот (П.11). Отдельный контейнер поверх того же
  # image, без cron. Общается с основным сервисом только через SQLite
  # (pending_messages / ai_decisions). Для работы из РФ пользователь
  # добавляет `network_mode: "service:wg-amnezia"` через
  # docker-compose.override.yml — в базовый файл network_mode не кладём.
  messenger-bot:
    container_name: hh_messenger_bot
    image: hh_applicant_tool:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "hh_applicant_tool", "run-messenger-bot"]
    volumes:
      - .:/app
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    depends_on:
      - hh_applicant_tool
    environment:
      - CONFIG_DIR=/app/config
      - HH_PROFILE_ID=${HH_PROFILE_ID:-}
      - TERM=${TERM}
